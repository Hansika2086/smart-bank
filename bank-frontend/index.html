<!DOCTYPE html>
<html>
<head>
<title>SmartBank</title>
<style>
body{
font-family:Segoe UI;
margin:0;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}
.header{
text-align:center;
padding:20px;
color:white;
font-size:28px;
font-weight:bold;
}
.container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:20px;
}
.card{
background:white;
padding:25px;
border-radius:15px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}
.card:hover{
transform:translateY(-5px);
}
h3{
text-align:center;
margin-bottom:15px;
}
input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
transition: all 0.1s ease;
}
button:active{
transform: scale(0.92);
}
.create{background:#4facfe;color:white;}
.deposit{background:#38a169;color:white;}
.withdraw{background:#e53e3e;color:white;}
.list{
margin-top:10px;
max-height:150px;
overflow-y:auto;
font-size:14px;
}
.item{
padding:6px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="header">🏦 SmartBank</div>

<div class="container">

<div class="card">
<h3>Create Account</h3>
<input id="accNo" placeholder="Account Number">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="balance" placeholder="Balance">
<select id="type">
<option>SAVINGS</option>
<option>CURRENT</option>
</select>
<button class="create" onclick="createAccount()">Create</button>
</div>

<div class="card">
<h3>Deposit / Withdraw</h3>
<input id="id" placeholder="Account ID">
<input id="amount" placeholder="Amount">
<button class="deposit" onclick="deposit()">Deposit</button>
<button class="withdraw" onclick="withdraw()">Withdraw</button>
</div>

<div class="card">
<h3>Accounts</h3>
<button onclick="getAccounts()">Refresh</button>
<div id="accountList" class="list"></div>
</div>

<div class="card">
<h3>Transactions</h3>
<button onclick="getTransactions()">View</button>
<div id="transactionList" class="list"></div>
</div>

<div class="card">
<h3>Check Balance</h3>

<input id="checkId" placeholder="Enter Account ID">

<button onclick="checkBalance()">Check Balance</button>

<div id="balanceResult" class="list"></div>
</div>

</div>

<script>

function createAccount(){
fetch("http://localhost:8080/accounts",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
accountNumber:document.getElementById("accNo").value,
holderName:document.getElementById("name").value,
email:document.getElementById("email").value,
balance:parseFloat(document.getElementById("balance").value),
accountType:document.getElementById("type").value
})
})
.then(res=>res.json())
.then(data=>{
alert("Account Created!\nYour Account ID is: " + data.id);
getAccounts();
});
}

function deposit(){
let idVal=document.getElementById("id").value;
let amountVal=document.getElementById("amount").value;

fetch(`http://localhost:8080/accounts/deposit/${idVal}?amount=${amountVal}`,{
method:"PUT"
})
.then(res=>{
if(!res.ok){
throw new Error("Deposit failed");
}
return res.json();
})
.then(()=>{
alert("Amount Deposited Successfully");
getAccounts();
})
.catch(err=>{
alert("Error: Check ID or Balance");
});
}

function withdraw(){
let idVal=document.getElementById("id").value;
let amountVal=document.getElementById("amount").value;

fetch(`http://localhost:8080/accounts/withdraw/${idVal}?amount=${amountVal}`,{
method:"PUT"
})
.then(res=>{
if(!res.ok){
throw new Error("Withdraw failed");
}
return res.json();
})
.then(()=>{
alert("Amount Withdrawn Successfully");
getAccounts();
})
.catch(()=>{
alert("Insufficient balance or wrong ID");
});
}

function checkBalance(){
let idVal=document.getElementById("checkId").value;

fetch("http://localhost:8080/accounts")
.then(res=>res.json())
.then(data=>{

let acc = data.find(a => a.id == idVal);

if(acc){
balanceResult.innerHTML =
`<div class="item"><b>${acc.holderName}</b><br>Balance: ₹${acc.balance}</div>`;
}
else{
balanceResult.innerHTML =
`<div class="item">Account not found</div>`;
}

});
}

function getAccounts(){
fetch("http://localhost:8080/accounts")
.then(res=>res.json())
.then(data=>{
accountList.innerHTML=data.map(a=>
`<div class="item">${a.id} - ${a.holderName} : ₹${a.balance}</div>`
).join("");
});
}

function getTransactions(){
fetch("http://localhost:8080/transactions")
.then(res=>res.json())
.then(data=>{

let grouped = {};

data.forEach(t=>{
let id = t.account.id;
let name = t.account.holderName;

if(!grouped[id]){
grouped[id] = {
name: name,
transactions: []
};
}

grouped[id].transactions.push(t);
});

let html = "";

for(let id in grouped){
html += `<div class="item"><b>${grouped[id].name} (${id})</b></div>`;

grouped[id].transactions.forEach(t=>{
html += `<div class="item" style="padding-left:15px;">
${t.type} : ₹${t.amount}
</div>`;
});
}

transactionList.innerHTML = html;

});
}

</script>

</body>
</html>
